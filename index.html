<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>LSAT Study Dashboard</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f9f8f6;
    --surface: #ffffff;
    --surface-2: #f2f1ee;
    --border: rgba(0,0,0,0.1);
    --border-med: rgba(0,0,0,0.18);
    --text: #1a1a18;
    --text-2: #6b6b67;
    --text-3: #a0a09b;
    --accent: #534AB7;
    --accent-light: #EEEDFE;
    --accent-mid: #7F77DD;
    --radius-md: 8px;
    --radius-lg: 12px;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #141413;
      --surface: #1e1e1c;
      --surface-2: #272725;
      --border: rgba(255,255,255,0.08);
      --border-med: rgba(255,255,255,0.15);
      --text: #f0efe9;
      --text-2: #9a9a94;
      --text-3: #636360;
      --accent: #7F77DD;
      --accent-light: #26215C;
      --accent-mid: #AFA9EC;
    }
  }

  body {
    font-family: 'Georgia', serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 2rem 1rem;
  }

  .page {
    max-width: 480px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    gap: 1.25rem;
  }

  .page-header {
    text-align: center;
    padding-bottom: 0.5rem;
  }

  .page-header h1 {
    font-size: 22px;
    font-weight: normal;
    letter-spacing: -0.01em;
    color: var(--text);
  }

  .page-header p {
    font-size: 13px;
    color: var(--text-3);
    margin-top: 4px;
    font-family: 'Courier New', monospace;
  }

  .card {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1.25rem;
  }

  .section-label {
    font-size: 10px;
    font-weight: bold;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--text-3);
    margin-bottom: 1rem;
    font-family: 'Courier New', monospace;
  }

  .countdown-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
  }

  .time-unit {
    background: var(--surface-2);
    border-radius: var(--radius-md);
    padding: 0.9rem 0.5rem;
    text-align: center;
  }

  .time-number {
    font-size: 30px;
    font-weight: normal;
    color: var(--text);
    line-height: 1;
    font-variant-numeric: tabular-nums;
  }

  .time-label {
    font-size: 10px;
    color: var(--text-3);
    margin-top: 5px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    font-family: 'Courier New', monospace;
  }

  .progress-wrap {
    margin-top: 1rem;
  }

  .progress-bar-bg {
    background: var(--surface-2);
    border-radius: 99px;
    height: 5px;
    overflow: hidden;
  }

  .progress-bar-fill {
    height: 100%;
    border-radius: 99px;
    background: var(--accent-mid);
    transition: width 1s linear;
  }

  .progress-meta {
    display: flex;
    justify-content: space-between;
    margin-top: 6px;
    font-size: 11px;
    color: var(--text-3);
    font-family: 'Courier New', monospace;
  }

  .habits-list {
    display: flex;
    flex-direction: column;
    gap: 7px;
  }

  .habit-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 12px;
    background: var(--surface-2);
    border-radius: var(--radius-md);
    cursor: pointer;
    user-select: none;
    transition: opacity 0.15s;
  }

  .habit-row:hover { opacity: 0.8; }

  .habit-check {
    width: 18px;
    height: 18px;
    border-radius: 50%;
    border: 1.5px solid var(--border-med);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
  }

  .habit-check.done {
    background: var(--accent);
    border-color: var(--accent);
  }

  .habit-check.done::after {
    content: '';
    display: block;
    width: 4px;
    height: 8px;
    border: 1.5px solid white;
    border-top: none;
    border-left: none;
    transform: rotate(45deg) translate(-1px, -1px);
  }

  .habit-name {
    flex: 1;
    font-size: 13px;
    color: var(--text);
    font-family: 'Courier New', monospace;
  }

  .habit-name.done {
    color: var(--text-3);
    text-decoration: line-through;
  }

  .habit-delete {
    font-size: 14px;
    color: var(--text-3);
    background: none;
    border: none;
    cursor: pointer;
    padding: 2px 4px;
    border-radius: 4px;
    line-height: 1;
    opacity: 0;
    transition: opacity 0.15s;
  }

  .habit-row:hover .habit-delete { opacity: 1; }

  .add-row {
    display: flex;
    gap: 8px;
    margin-top: 10px;
  }

  .add-row input {
    flex: 1;
    font-size: 13px;
    font-family: 'Courier New', monospace;
    padding: 8px 10px;
    border-radius: var(--radius-md);
    border: 0.5px solid var(--border-med);
    background: var(--surface-2);
    color: var(--text);
    outline: none;
  }

  .add-row input::placeholder { color: var(--text-3); }
  .add-row input:focus { border-color: var(--accent-mid); }

  .add-btn {
    padding: 8px 12px;
    border-radius: var(--radius-md);
    border: 0.5px solid var(--border-med);
    background: transparent;
    color: var(--text);
    font-size: 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .add-btn:hover { background: var(--surface-2); }

  .stats-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    margin-top: 1rem;
  }

  .stat-card {
    background: var(--surface-2);
    border-radius: var(--radius-md);
    padding: 0.75rem;
    text-align: center;
  }

  .stat-number {
    font-size: 22px;
    font-weight: normal;
    color: var(--text);
  }

  .stat-label {
    font-size: 10px;
    color: var(--text-3);
    margin-top: 3px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    font-family: 'Courier New', monospace;
  }

  .streak-fire { color: var(--accent-mid); font-size: 10px; margin-left: 2px; }
</style>
</head>
<body>

<div class="page">

  <div class="page-header">
    <h1>LSAT Study Dashboard</h1>
    <p id="today-label">—</p>
  </div>

  <div class="card">
    <div class="section-label">Countdown — August 7, 2026</div>
    <div class="countdown-grid">
      <div class="time-unit"><div class="time-number" id="cd-days">--</div><div class="time-label">Days</div></div>
      <div class="time-unit"><div class="time-number" id="cd-hours">--</div><div class="time-label">Hours</div></div>
      <div class="time-unit"><div class="time-number" id="cd-mins">--</div><div class="time-label">Mins</div></div>
      <div class="time-unit"><div class="time-number" id="cd-secs">--</div><div class="time-label">Secs</div></div>
    </div>
    <div class="progress-wrap">
      <div class="progress-bar-bg"><div class="progress-bar-fill" id="prog-bar" style="width:0%"></div></div>
      <div class="progress-meta">
        <span>Jun 1</span>
        <span id="prog-pct">0% of study plan</span>
        <span>Aug 7</span>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="section-label">Daily habits</div>
    <div class="habits-list" id="habits-list"></div>
    <div class="add-row">
      <input type="text" id="new-habit" placeholder="Add a habit..." maxlength="50" />
      <button class="add-btn" onclick="addHabit()" aria-label="Add habit"><i class="ti ti-plus"></i></button>
    </div>
    <div class="stats-row">
      <div class="stat-card"><div class="stat-number" id="stat-today">0/0</div><div class="stat-label">Today</div></div>
      <div class="stat-card"><div class="stat-number" id="stat-streak">0</div><div class="stat-label">Streak</div></div>
      <div class="stat-card"><div class="stat-number" id="stat-best">0</div><div class="stat-label">Best</div></div>
    </div>
  </div>

</div>

<script>
const TEST_DATE = new Date('2026-08-07T08:00:00');
const STUDY_START = new Date('2026-06-01T00:00:00');

function pad(n){ return String(n).padStart(2,'0'); }

function updateCountdown(){
  const now = new Date();
  const diff = TEST_DATE - now;
  const days = Math.max(0, Math.floor(diff / 86400000));
  const hours = Math.max(0, Math.floor((diff % 86400000) / 3600000));
  const mins = Math.max(0, Math.floor((diff % 3600000) / 60000));
  const secs = Math.max(0, Math.floor((diff % 60000) / 1000));
  document.getElementById('cd-days').textContent = days;
  document.getElementById('cd-hours').textContent = pad(hours);
  document.getElementById('cd-mins').textContent = pad(mins);
  document.getElementById('cd-secs').textContent = pad(secs);

  const total = TEST_DATE - STUDY_START;
  const elapsed = now - STUDY_START;
  const pct = Math.min(100, Math.max(0, Math.round((elapsed / total) * 100)));
  document.getElementById('prog-bar').style.width = pct + '%';
  document.getElementById('prog-pct').textContent = pct + '% of study plan';

  const opts = { weekday: 'long', month: 'long', day: 'numeric' };
  document.getElementById('today-label').textContent = now.toLocaleDateString('en-US', opts);
}

const DEFAULT_HABITS = [
  'Review error log (10 min)',
  'Complete drill or PT section',
  'Deep review / explanations',
  'Read RC passage untimed',
];

const todayKey = () => new Date().toISOString().slice(0,10);

function loadState(){
  try { return JSON.parse(localStorage.getItem('lsat_habits_v1') || 'null'); } catch(e){ return null; }
}
function saveState(s){
  try { localStorage.setItem('lsat_habits_v1', JSON.stringify(s)); } catch(e){}
}

let state = loadState() || { habits: DEFAULT_HABITS.map(n=>({name:n})), log: {}, best: 0 };

function getChecked(){
  return state.log[todayKey()] || [];
}

function calcStreak(){
  let streak = 0;
  const d = new Date();
  for(let i = 0; i < 365; i++){
    const key = d.toISOString().slice(0,10);
    const checked = state.log[key] || [];
    if(state.habits.length > 0 && checked.length === state.habits.length){
      streak++;
      d.setDate(d.getDate()-1);
    } else { break; }
  }
  return streak;
}

function renderHabits(){
  const list = document.getElementById('habits-list');
  const checked = getChecked();
  list.innerHTML = '';
  state.habits.forEach((h,i) => {
    const isDone = checked.includes(i);
    const row = document.createElement('div');
    row.className = 'habit-row';
    row.innerHTML = `
      <div class="habit-check ${isDone?'done':''}" onclick="toggleHabit(${i})"></div>
      <span class="habit-name ${isDone?'done':''}" onclick="toggleHabit(${i})">${h.name}</span>
      <button class="habit-delete" onclick="deleteHabit(${i})" aria-label="Remove habit"><i class="ti ti-x"></i></button>
    `;
    list.appendChild(row);
  });
  const streak = calcStreak();
  if(streak > (state.best||0)) state.best = streak;
  document.getElementById('stat-today').textContent = checked.length + '/' + state.habits.length;
  document.getElementById('stat-streak').textContent = streak;
  document.getElementById('stat-best').textContent = state.best || 0;
  saveState(state);
}

function toggleHabit(i){
  const today = todayKey();
  if(!state.log[today]) state.log[today] = [];
  const idx = state.log[today].indexOf(i);
  if(idx === -1) state.log[today].push(i);
  else state.log[today].splice(idx,1);
  renderHabits();
}

function deleteHabit(i){
  state.habits.splice(i,1);
  Object.keys(state.log).forEach(k => {
    state.log[k] = state.log[k].filter(x => x !== i).map(x => x > i ? x-1 : x);
  });
  renderHabits();
}

function addHabit(){
  const input = document.getElementById('new-habit');
  const name = input.value.trim();
  if(!name) return;
  state.habits.push({name});
  input.value = '';
  renderHabits();
}

document.getElementById('new-habit').addEventListener('keydown', e => {
  if(e.key === 'Enter') addHabit();
});

updateCountdown();
setInterval(updateCountdown, 1000);
renderHabits();
</script>
</body>
</html>
