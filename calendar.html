<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Calendar</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #f9f9f9;
    --surface:  #ffffff;
    --surface2: #f2f2f2;
    --surface3: #e8e8e8;
    --border:   rgba(0,0,0,0.08);
    --border2:  rgba(0,0,0,0.15);
    --text:     #1a1a1a;
    --text2:    #555555;
    --text3:    #999999;
    --accent:   #1a1a1a;
    --accent-fg:#f9f9f9;
  }

  body {
    font-family: 'Georgia', serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2rem 1rem;
  }

  .widget { width: 100%; max-width: 460px; display: flex; flex-direction: column; gap: 1rem; }

  /* VIEW TOGGLE */
  .view-tabs {
    display: flex;
    background: var(--surface);
    border: 0.5px solid var(--border2);
    border-radius: 12px;
    padding: 4px;
    gap: 3px;
  }

  .view-tab {
    flex: 1; padding: 7px; border: none; border-radius: 9px;
    background: transparent; font-family: 'Courier New', monospace;
    font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--text3); cursor: pointer; transition: all 0.15s;
  }

  .view-tab.active { background: var(--accent); color: var(--accent-fg); }

  /* CALENDAR CARD */
  .cal-card {
    background: var(--surface);
    border: 0.5px solid var(--border2);
    border-radius: 16px;
    padding: 1.25rem;
  }

  /* HEADER */
  .cal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1.25rem;
  }

  .cal-title {
    font-size: 15px;
    font-weight: normal;
    color: var(--text);
    letter-spacing: 0.02em;
  }

  .nav-btns { display: flex; gap: 4px; }

  .nav-btn {
    width: 28px; height: 28px;
    border-radius: 7px;
    border: 0.5px solid var(--border2);
    background: var(--surface2);
    color: var(--text2);
    font-size: 13px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s;
  }

  .nav-btn:hover { background: var(--surface3); }

  .today-btn {
    font-size: 10px;
    font-family: 'Courier New', monospace;
    letter-spacing: 0.06em;
    padding: 0 10px;
    width: auto;
    border-radius: 7px;
  }

  /* MONTH VIEW */
  .month-grid { width: 100%; }

  .dow-row {
    display: grid;
    gap: 2px;
    margin-bottom: 4px;
  }

  .dow-cell {
    text-align: center;
    font-size: 10px;
    font-family: 'Courier New', monospace;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text2);
    font-weight: bold;
    padding: 6px 0;
    border-bottom: 0.5px solid var(--border2);
    margin-bottom: 2px;
  }

  .days-grid { display: grid; gap: 2px; }

  .day-cell {
    position: relative;
    aspect-ratio: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    border-radius: 8px;
    cursor: default;
    transition: background 0.1s;
    min-height: 36px;
  }

  .day-cell:hover { background: var(--surface2); }

  .day-num {
    font-size: 13px;
    color: var(--text2);
    font-variant-numeric: tabular-nums;
    line-height: 1;
    font-family: 'Courier New', monospace;
  }

  .day-cell.other-month .day-num { color: var(--text3); opacity: 0.45; }

  .day-cell.today { background: var(--accent); border-radius: 8px; }
  .day-cell.today .day-num { color: var(--accent-fg); font-weight: bold; }

  .day-cell.today:hover { opacity: 0.9; }

  .week-num-cell {
    display: flex; align-items: center; justify-content: center;
    font-size: 9px; color: var(--text3);
    font-family: 'Courier New', monospace;
    min-height: 36px;
  }

  /* MARKER DOTS */
  .marker-dots {
    display: flex; gap: 2px; justify-content: center;
    margin-top: 2px; flex-wrap: wrap;
  }

  .marker-dot {
    width: 4px; height: 4px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .day-cell.today .marker-dot { opacity: 0.8; }

  /* YEAR VIEW */
  .year-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
  }

  .mini-month { cursor: pointer; }

  .mini-title {
    font-size: 10px;
    font-family: 'Courier New', monospace;
    color: var(--text2);
    text-align: center;
    margin-bottom: 5px;
    letter-spacing: 0.04em;
  }

  .mini-month.current-month .mini-title { color: var(--accent); font-weight: bold; }

  .mini-grid { display: grid; gap: 1px; }

  .mini-dow {
    text-align: center;
    font-size: 7px;
    color: var(--text3);
    font-family: 'Courier New', monospace;
    padding: 1px 0;
  }

  .mini-day {
    text-align: center;
    font-size: 8px;
    font-family: 'Courier New', monospace;
    color: var(--text3);
    border-radius: 3px;
    padding: 1px 0;
    line-height: 1.6;
  }

  .mini-day.today-mini {
    background: var(--accent);
    color: var(--accent-fg);
    border-radius: 3px;
  }

  .mini-day.has-marker { text-decoration: underline; text-decoration-color: var(--accent); }
  .mini-day.other { opacity: 0.25; }

  /* LEGEND */
  .legend {
    display: flex; flex-wrap: wrap; gap: 8px;
    margin-top: 0.75rem;
    padding-top: 0.75rem;
    border-top: 0.5px solid var(--border);
  }

  .legend-item {
    display: flex; align-items: center; gap: 5px;
    font-size: 10px; color: var(--text2);
    font-family: 'Courier New', monospace;
  }

  .legend-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }

  /* SETTINGS */
  .settings-card {
    background: var(--surface);
    border: 0.5px solid var(--border2);
    border-radius: 16px;
    overflow: hidden;
  }

  .settings-toggle {
    width: 100%; display: flex; align-items: center; justify-content: space-between;
    padding: 0.85rem 1.25rem; background: none; border: none; cursor: pointer;
    font-family: 'Courier New', monospace; font-size: 10px;
    letter-spacing: 0.12em; text-transform: uppercase; color: var(--text3);
  }

  .settings-toggle:hover { background: var(--surface2); }
  .settings-toggle .chevron { font-size: 14px; transition: transform 0.2s; display: inline-block; }
  .settings-toggle.open .chevron { transform: rotate(180deg); }

  .settings-body { display: none; padding: 0 1.25rem 1.25rem; border-top: 0.5px solid var(--border); }
  .settings-body.open { display: block; }

  .settings-section {
    font-size: 9px; font-family: 'Courier New', monospace;
    letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--text3); margin: 1rem 0 0.5rem;
  }

  .setting-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 0.6rem 0; border-bottom: 0.5px solid var(--border); gap: 12px;
  }

  .setting-row:last-child { border-bottom: none; }
  .setting-row.col { flex-direction: column; align-items: flex-start; gap: 8px; }

  .setting-label { font-size: 12px; color: var(--text2); font-family: 'Courier New', monospace; }
  .setting-sub { font-size: 10px; color: var(--text3); font-family: 'Courier New', monospace; margin-top: 2px; }

  .toggle { position: relative; width: 36px; height: 20px; flex-shrink: 0; }
  .toggle input { opacity: 0; width: 0; height: 0; position: absolute; }
  .toggle-track {
    position: absolute; inset: 0; border-radius: 99px;
    background: var(--surface2); border: 0.5px solid var(--border2);
    cursor: pointer; transition: background 0.2s;
  }
  .toggle input:checked + .toggle-track { background: var(--accent); border-color: var(--accent); }
  .toggle-track::after {
    content: ''; position: absolute; width: 14px; height: 14px;
    border-radius: 50%; background: var(--text3); top: 2px; left: 2px;
    transition: transform 0.2s, background 0.2s;
  }
  .toggle input:checked + .toggle-track::after { transform: translateX(16px); background: var(--bg); }

  /* MARKERS LIST */
  .markers-list { display: flex; flex-direction: column; gap: 6px; width: 100%; }

  .marker-row {
    display: flex; align-items: center; gap: 6px;
    background: var(--surface2); border-radius: 8px; padding: 6px 8px;
  }

  .marker-color-pick {
    width: 22px; height: 22px; border-radius: 5px;
    border: 0.5px solid var(--border2); cursor: pointer; padding: 1px;
    flex-shrink: 0;
  }

  /* week highlight band */
  .week-highlight {
    position: absolute;
    inset: 0;
    border-radius: 8px;
    opacity: 0.18;
    pointer-events: none;
  }

  .day-cell.week-start .week-highlight { border-radius: 8px 0 0 8px; }
  .day-cell.week-end   .week-highlight { border-radius: 0 8px 8px 0; }
  .day-cell.week-mid   .week-highlight { border-radius: 0; }

  /* type pill in marker editor */
  .type-select {
    font-size: 10px; font-family: 'Courier New', monospace;
    padding: 4px 6px; border-radius: 6px;
    border: 0.5px solid var(--border2); background: var(--surface);
    color: var(--text); outline: none; flex-shrink: 0; width: 68px;
  }
  .type-select:focus { border-color: var(--accent); }

  .marker-date-in {
    width: 110px; font-size: 11px; font-family: 'Courier New', monospace;
    padding: 4px 6px; border-radius: 6px;
    border: 0.5px solid var(--border2); background: var(--surface);
    color: var(--text); outline: none; flex-shrink: 0;
  }

  .marker-label-in {
    flex: 1; font-size: 11px; font-family: 'Courier New', monospace;
    padding: 4px 6px; border-radius: 6px;
    border: 0.5px solid var(--border2); background: var(--surface);
    color: var(--text); outline: none;
  }

  .marker-date-in:focus, .marker-label-in:focus { border-color: var(--accent); }

  .marker-del {
    background: none; border: none; cursor: pointer;
    color: var(--text3); font-size: 13px; padding: 2px 3px;
    border-radius: 4px; transition: color 0.15s; flex-shrink: 0;
  }
  .marker-del:hover { color: var(--text); }

  .add-marker-btn {
    font-size: 11px; font-family: 'Courier New', monospace;
    color: var(--text2); background: var(--surface2);
    border: 0.5px dashed var(--border2); border-radius: 7px;
    padding: 5px 10px; cursor: pointer; width: 100%;
    text-align: left; transition: background 0.15s;
  }
  .add-marker-btn:hover { background: var(--surface3); }

  input[type="color"] {
    width: 32px; height: 32px; border-radius: 6px;
    border: 0.5px solid var(--border2); background: none;
    cursor: pointer; padding: 2px;
  }

  .save-btn {
    width: 100%; margin-top: 1rem; padding: 9px; border-radius: 9px;
    border: none; background: var(--accent); color: var(--accent-fg);
    font-size: 11px; font-family: 'Courier New', monospace;
    letter-spacing: 0.1em; text-transform: uppercase;
    cursor: pointer; transition: opacity 0.15s;
  }
  .save-btn:hover { opacity: 0.75; }
</style>
</head>
<body>
<div class="widget">

  <!-- VIEW TABS -->
  <div class="view-tabs">
    <button class="view-tab active" id="tab-month" onclick="setView('month')">Month</button>
    <button class="view-tab" id="tab-year" onclick="setView('year')">Year</button>
  </div>

  <!-- CALENDAR CARD -->
  <div class="cal-card">
    <div class="cal-header">
      <div class="cal-title" id="cal-title">June 2026</div>
      <div class="nav-btns">
        <button class="nav-btn today-btn" onclick="goToday()">Today</button>
        <button class="nav-btn" onclick="navPrev()">‹</button>
        <button class="nav-btn" onclick="navNext()">›</button>
      </div>
    </div>
    <div id="cal-body"></div>
    <div class="legend" id="legend" style="display:none;"></div>
  </div>

  <!-- SETTINGS -->
  <div class="settings-card">
    <button class="settings-toggle" id="settings-btn" onclick="toggleSettings()">
      <span>⚙ Customize</span>
      <span class="chevron">▾</span>
    </button>
    <div class="settings-body" id="settings-body">

      <div class="settings-section">Appearance</div>

      <div class="setting-row">
        <div class="setting-label">Accent color</div>
        <input type="color" id="c-accent" value="#1a1a1a" oninput="applyAccent()" />
      </div>

      <div class="settings-section">Preferences</div>

      <div class="setting-row">
        <div><div class="setting-label">Start week on Monday</div></div>
        <label class="toggle"><input type="checkbox" id="t-monday" onchange="render()"><span class="toggle-track"></span></label>
      </div>

      <div class="setting-row">
        <div><div class="setting-label">Show week numbers</div></div>
        <label class="toggle"><input type="checkbox" id="t-weeknums" onchange="render()"><span class="toggle-track"></span></label>
      </div>

      <div class="settings-section">Date Markers</div>

      <div class="markers-list" id="markers-list"></div>
      <button class="add-marker-btn" onclick="addMarker()" style="margin-top:8px;">+ Add date marker</button>

      <button class="save-btn" onclick="saveAll()">Save</button>
    </div>
  </div>

</div>
<script>
// ── STATE ──────────────────────────────────────────────────────────────────
function loadCfg(){ try{ return JSON.parse(localStorage.getItem('cal_cfg')||'null'); }catch(e){ return null; } }
function saveCfg(){ try{ localStorage.setItem('cal_cfg', JSON.stringify(cfg)); }catch(e){} }

const TODAY = new Date();
TODAY.setHours(0,0,0,0);

let cfg = loadCfg() || {
  accentColor: '#1a1a1a',
  mondayStart: false,
  weekNums: false,
  markers: [],
  view: 'month',
};

// ensure markers is always array
if(!Array.isArray(cfg.markers)) cfg.markers = [];

let curYear  = TODAY.getFullYear();
let curMonth = TODAY.getMonth();
let view     = cfg.view || 'month';

const MONTH_NAMES = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const DOW_SUN = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const DOW_MON = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];

// ── COLORS ─────────────────────────────────────────────────────────────────
function isLight(hex){
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return (r*299+g*587+b*114)/1000 > 160;
}

function applyAccent(){
  const c = document.getElementById('c-accent').value;
  cfg.accentColor = c;
  const fg = isLight(c) ? '#1a1a1a' : '#f9f9f9';
  document.documentElement.style.setProperty('--accent', c);
  document.documentElement.style.setProperty('--accent-fg', fg);
  saveCfg();
  render();
}

// ── MARKERS ────────────────────────────────────────────────────────────────
function markersForDate(ds){
  return cfg.markers.filter(m => {
    if(m.type === 'week'){
      if(!m.date) return false;
      const end = m.dateEnd || m.date;
      return ds >= m.date && ds <= end;
    }
    return m.date === ds;
  });
}

function dayMarkersForDate(ds){
  return cfg.markers.filter(m => m.type !== 'week' && m.date === ds);
}

function weekMarkersForDate(ds){
  return cfg.markers.filter(m => {
    if(m.type !== 'week' || !m.date) return false;
    const end = m.dateEnd || m.date;
    return ds >= m.date && ds <= end;
  });
}

function dateStr(y,m,d){
  return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
}

// ── WEEK NUMBER (ISO) ──────────────────────────────────────────────────────
function getWeekNum(date){
  const d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
  const dayNum = d.getUTCDay() || 7;
  d.setUTCDate(d.getUTCDate() + 4 - dayNum);
  const yearStart = new Date(Date.UTC(d.getUTCFullYear(),0,1));
  return Math.ceil((((d - yearStart) / 86400000) + 1)/7);
}

// ── NAVIGATION ─────────────────────────────────────────────────────────────
function navPrev(){
  if(view === 'month'){ curMonth--; if(curMonth<0){ curMonth=11; curYear--; } }
  else { curYear--; }
  render();
}

function navNext(){
  if(view === 'month'){ curMonth++; if(curMonth>11){ curMonth=0; curYear++; } }
  else { curYear++; }
  render();
}

function goToday(){
  curYear = TODAY.getFullYear(); curMonth = TODAY.getMonth(); render();
}

function setView(v){
  view = v; cfg.view = v; saveCfg();
  document.getElementById('tab-month').classList.toggle('active', v==='month');
  document.getElementById('tab-year').classList.toggle('active', v==='year');
  render();
}

// ── RENDER ─────────────────────────────────────────────────────────────────
function render(){
  const mondayStart = document.getElementById('t-monday').checked;
  const showWeekNums = document.getElementById('t-weeknums').checked;
  const body = document.getElementById('cal-body');

  if(view === 'month'){
    document.getElementById('cal-title').textContent = `${MONTH_NAMES[curMonth]} ${curYear}`;
    body.innerHTML = renderMonth(curYear, curMonth, mondayStart, showWeekNums);
    renderLegend();
  } else {
    document.getElementById('cal-title').textContent = `${curYear}`;
    body.innerHTML = renderYear(curYear, mondayStart);
    document.getElementById('legend').style.display = 'none';
  }
}

function renderMonth(year, month, mondayStart, showWeekNums){
  const dows = mondayStart ? DOW_MON : DOW_SUN;
  const cols = showWeekNums ? dows.length + 1 : dows.length;
  const gridStyle = `grid-template-columns: repeat(${cols}, 1fr);`;

  let html = `<div class="month-grid">`;

  // DOW headers
  html += `<div class="dow-row" style="${gridStyle}">`;
  if(showWeekNums) html += `<div class="dow-cell" style="font-size:8px;">W</div>`;
  dows.forEach(d => { html += `<div class="dow-cell">${d}</div>`; });
  html += `</div>`;

  // Days
  const firstDay = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month+1, 0).getDate();
  const daysInPrevMonth = new Date(year, month, 0).getDate();

  // offset: how many cells before day 1
  let offset = mondayStart ? (firstDay === 0 ? 6 : firstDay - 1) : firstDay;

  // build cells array
  const cells = [];
  for(let i = offset-1; i >= 0; i--) cells.push({ day: daysInPrevMonth-i, month: month-1, year: month===0?year-1:year, other: true });
  for(let d = 1; d <= daysInMonth; d++) cells.push({ day: d, month, year, other: false });
  const remaining = (cols - (showWeekNums?1:0)) - ((cells.length) % (cols-(showWeekNums?1:0)));
  if(remaining < (cols-(showWeekNums?1:0))) for(let d=1; d<=remaining; d++) cells.push({ day: d, month: month+1, year: month===11?year+1:year, other: true });

  html += `<div class="days-grid" style="${gridStyle}">`;
  let cellIdx = 0;
  const rowSize = cols - (showWeekNums?1:0);
  while(cellIdx < cells.length){
    if(showWeekNums){
      const c = cells[cellIdx];
      const wDate = new Date(c.year, c.month, c.day);
      html += `<div class="week-num-cell">${getWeekNum(wDate)}</div>`;
    }
    for(let col=0; col<rowSize && cellIdx<cells.length; col++, cellIdx++){
      const c = cells[cellIdx];
      const ds = dateStr(c.year, c.month, c.day);
      const isToday = !c.other && c.day===TODAY.getDate() && c.month===TODAY.getMonth() && c.year===TODAY.getFullYear();
      const dayMarkers = dayMarkersForDate(ds);
      const weekMarkers = weekMarkersForDate(ds);

      let cls = 'day-cell';
      if(c.other) cls += ' other-month';
      if(isToday) cls += ' today';

      // week highlight bands
      let weekBandsHtml = '';
      if(weekMarkers.length){
        weekMarkers.forEach(wm => {
          const end = wm.dateEnd || wm.date;
          let pos = '';
          if(ds === wm.date && ds === end) pos = 'week-start week-end';
          else if(ds === wm.date) pos = 'week-start';
          else if(ds === end) pos = 'week-end';
          else pos = 'week-mid';
          // add position class to cell
          cls += ' ' + pos;
          weekBandsHtml += `<div class="week-highlight" style="background:${wm.color};"></div>`;
        });
      }

      let dotsHtml = '';
      if(dayMarkers.length){
        dotsHtml = `<div class="marker-dots">${dayMarkers.map(m=>`<div class="marker-dot" style="background:${m.color}" title="${m.label||''}"></div>`).join('')}</div>`;
      }
      html += `<div class="${cls}">${weekBandsHtml}<div class="day-num">${c.day}</div>${dotsHtml}</div>`;
    }
  }
  html += `</div></div>`;
  return html;
}

function renderYear(year, mondayStart){
  const dows = (mondayStart ? DOW_MON : DOW_SUN).map(d=>d[0]);
  let html = `<div class="year-grid">`;
  for(let m=0; m<12; m++){
    const isCurrentMonth = year===TODAY.getFullYear() && m===TODAY.getMonth();
    html += `<div class="mini-month ${isCurrentMonth?'current-month':''}" onclick="setView('month'); curMonth=${m}; curYear=${year}; render();">`;
    html += `<div class="mini-title">${MONTH_NAMES[m].slice(0,3)}</div>`;
    const cols = dows.length;
    html += `<div class="mini-grid" style="grid-template-columns:repeat(${cols},1fr);">`;
    dows.forEach(d => { html += `<div class="mini-dow">${d}</div>`; });

    const firstDay = new Date(year, m, 1).getDay();
    const daysInMonth = new Date(year, m+1, 0).getDate();
    let offset = mondayStart ? (firstDay===0?6:firstDay-1) : firstDay;
    for(let i=0; i<offset; i++) html += `<div class="mini-day other"></div>`;
    for(let d=1; d<=daysInMonth; d++){
      const ds = dateStr(year, m, d);
      const isToday = d===TODAY.getDate() && m===TODAY.getMonth() && year===TODAY.getFullYear();
      const hasMarker = markersForDate(ds).length > 0;
      let cls = 'mini-day';
      if(isToday) cls += ' today-mini';
      if(hasMarker && !isToday) cls += ' has-marker';
      html += `<div class="${cls}">${d}</div>`;
    }
    html += `</div></div>`;
  }
  html += `</div>`;
  return html;
}

function renderLegend(){
  const legend = document.getElementById('legend');
  const labeled = cfg.markers.filter(m => m.label);
  if(!labeled.length){ legend.style.display='none'; return; }
  legend.style.display='flex';
  legend.innerHTML = labeled.map(m =>
    `<div class="legend-item"><div class="legend-dot" style="background:${m.color}"></div>${m.label}</div>`
  ).join('');
}

// ── MARKER EDITOR ──────────────────────────────────────────────────────────
function renderMarkersList(){
  const list = document.getElementById('markers-list');
  list.innerHTML = '';
  cfg.markers.forEach((m,i) => {
    const isWeek = m.type === 'week';
    const row = document.createElement('div');
    row.className = 'marker-row';
    row.style.flexWrap = 'wrap';
    row.innerHTML = `
      <input type="color" class="marker-color-pick" value="${m.color}" oninput="cfg.markers[${i}].color=this.value; saveCfg(); render();" />
      <select class="type-select" onchange="cfg.markers[${i}].type=this.value; saveCfg(); renderMarkersList(); render();">
        <option value="day" ${!isWeek?'selected':''}>Day</option>
        <option value="week" ${isWeek?'selected':''}>Week</option>
      </select>
      <input type="date" class="marker-date-in" value="${m.date}" placeholder="${isWeek?'Week start':'Date'}"
        style="width:${isWeek?'102px':'130px'};"
        oninput="cfg.markers[${i}].date=this.value; saveCfg(); render();" />
      ${isWeek ? `<input type="date" class="marker-date-in" value="${m.dateEnd||''}" placeholder="Week end"
        style="width:102px;"
        oninput="cfg.markers[${i}].dateEnd=this.value; saveCfg(); render();" />` : ''}
      <input type="text" class="marker-label-in" placeholder="Label (optional)" value="${m.label||''}"
        oninput="cfg.markers[${i}].label=this.value; saveCfg(); render();" />
      <button class="marker-del" onclick="deleteMarker(${i})">✕</button>
    `;
    list.appendChild(row);
  });
}

function addMarker(){
  const ds = dateStr(TODAY.getFullYear(), TODAY.getMonth(), TODAY.getDate());
  cfg.markers.push({ type: 'day', date: ds, dateEnd: '', color: cfg.accentColor || '#1a1a1a', label: '' });
  saveCfg(); renderMarkersList(); render();
}

function deleteMarker(i){
  cfg.markers.splice(i,1); saveCfg(); renderMarkersList(); render();
}

// ── SETTINGS ───────────────────────────────────────────────────────────────
function saveAll(){
  cfg.mondayStart = document.getElementById('t-monday').checked;
  cfg.weekNums    = document.getElementById('t-weeknums').checked;
  saveCfg(); render();
  document.getElementById('settings-body').classList.remove('open');
  document.getElementById('settings-btn').classList.remove('open');
}

function toggleSettings(){
  const btn=document.getElementById('settings-btn'), body=document.getElementById('settings-body');
  const open=body.classList.toggle('open'); btn.classList.toggle('open',open);
  if(open) renderMarkersList();
}

// ── INIT ───────────────────────────────────────────────────────────────────
function init(){
  const accent = cfg.accentColor || '#1a1a1a';
  const fg = isLight(accent) ? '#1a1a1a' : '#f9f9f9';
  document.documentElement.style.setProperty('--accent', accent);
  document.documentElement.style.setProperty('--accent-fg', fg);
  document.getElementById('c-accent').value   = accent;
  document.getElementById('t-monday').checked  = cfg.mondayStart || false;
  document.getElementById('t-weeknums').checked = cfg.weekNums || false;
  document.getElementById('tab-month').classList.toggle('active', view==='month');
  document.getElementById('tab-year').classList.toggle('active', view==='year');
  render();
}

init();
</script>
</body>
</html>
