<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Habit Tracker</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:      #f9f9f9;
    --surface: #ffffff;
    --surface2:#f2f2f2;
    --border:  rgba(0,0,0,0.08);
    --border2: rgba(0,0,0,0.15);
    --text:    #1a1a1a;
    --text2:   #555555;
    --text3:   #999999;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg:      #111111;
      --surface: #1c1c1c;
      --surface2:#252525;
      --border:  rgba(255,255,255,0.07);
      --border2: rgba(255,255,255,0.13);
      --text:    #e8e8e8;
      --text2:   #aaaaaa;
      --text3:   #666666;
    }
  }

  body {
    font-family: 'Georgia', serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2rem 1rem;
  }

  .widget { width: 100%; max-width: 420px; }

  .card {
    background: var(--surface);
    border: 0.5px solid var(--border2);
    border-radius: 16px;
    padding: 1.4rem;
  }

  .section-label {
    font-size: 9px;
    font-weight: bold;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    color: var(--text3);
    margin-bottom: 0.5rem;
    font-family: 'Courier New', monospace;
  }

  .today-label {
    font-size: 11px;
    color: var(--text3);
    font-family: 'Courier New', monospace;
    margin-bottom: 1rem;
    letter-spacing: 0.03em;
  }

  .habits-list { display: flex; flex-direction: column; gap: 7px; }

  .habit-row {
    display: flex;
    align-items: center;
    gap: 9px;
    padding: 9px 11px;
    background: var(--surface2);
    border-radius: 9px;
    cursor: pointer;
    user-select: none;
    border: 0.5px solid transparent;
    transition: border-color 0.15s;
  }

  .habit-row:hover { border-color: var(--border2); }

  .habit-check {
    width: 17px; height: 17px;
    border-radius: 50%;
    border: 1.5px solid var(--border2);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    background: var(--surface);
  }

  .habit-check.done { background: var(--text); border-color: var(--text); }

  .habit-check.done::after {
    content: '';
    display: block;
    width: 4px; height: 7px;
    border: 1.5px solid var(--bg);
    border-top: none; border-left: none;
    transform: rotate(45deg) translate(-1px,-1px);
  }

  .habit-name { flex: 1; font-size: 12px; color: var(--text); font-family: 'Courier New', monospace; line-height: 1.3; }
  .habit-name.done { color: var(--text3); text-decoration: line-through; }

  .habit-delete {
    font-size: 13px; color: var(--text3);
    background: none; border: none; cursor: pointer;
    padding: 2px 3px; border-radius: 4px;
    opacity: 0; transition: opacity 0.15s; line-height: 1;
  }

  .habit-row:hover .habit-delete { opacity: 1; }

  .add-row { display: flex; gap: 7px; margin-top: 10px; }

  .add-row input {
    flex: 1; font-size: 12px; font-family: 'Courier New', monospace;
    padding: 7px 10px; border-radius: 9px;
    border: 0.5px solid var(--border2);
    background: var(--surface2); color: var(--text); outline: none;
  }

  .add-row input::placeholder { color: var(--text3); }
  .add-row input:focus { border-color: var(--text); }

  .add-btn {
    padding: 7px 11px; border-radius: 9px; border: none;
    background: var(--text); color: var(--bg);
    font-size: 15px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: opacity 0.15s;
  }

  .add-btn:hover { opacity: 0.8; }

  .divider { height: 0.5px; background: var(--border2); margin: 1rem 0; }

  .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 7px; }

  .stat-card {
    background: var(--surface2);
    border-radius: 9px; padding: 0.65rem 0.5rem;
    text-align: center; border: 0.5px solid var(--border);
  }

  .stat-number { font-size: 20px; font-weight: normal; color: var(--text); }

  .stat-label {
    font-size: 9px; color: var(--text3); margin-top: 2px;
    text-transform: uppercase; letter-spacing: 0.08em;
    font-family: 'Courier New', monospace;
  }

  .empty-state {
    text-align: center; padding: 1.5rem 0 0.5rem;
    font-size: 12px; color: var(--text3); font-family: 'Courier New', monospace;
  }
</style>
</head>
<body>
<div class="widget">
  <div class="card">
    <div class="section-label">Daily habits</div>
    <div class="today-label" id="today-lbl">—</div>
    <div class="habits-list" id="habits-list"></div>
    <div class="add-row">
      <input type="text" id="new-habit" placeholder="Add a habit..." maxlength="50" />
      <button class="add-btn" onclick="addHabit()" aria-label="Add habit"><i class="ti ti-plus"></i></button>
    </div>
    <div class="divider"></div>
    <div class="stats-row">
      <div class="stat-card"><div class="stat-number" id="stat-today">0/0</div><div class="stat-label">Today</div></div>
      <div class="stat-card"><div class="stat-number" id="stat-streak">0</div><div class="stat-label">Streak</div></div>
      <div class="stat-card"><div class="stat-number" id="stat-best">0</div><div class="stat-label">Best</div></div>
    </div>
  </div>
</div>
<script>
const DEFAULT_HABITS=['Review error log (10 min)','Complete drill or PT section','Deep review / explanations','Read RC passage untimed'];
const todayKey=()=>new Date().toISOString().slice(0,10);
function loadState(){ try{ return JSON.parse(localStorage.getItem('lsat_habits_v4')||'null'); }catch(e){ return null; } }
function saveState(s){ try{ localStorage.setItem('lsat_habits_v4',JSON.stringify(s)); }catch(e){} }
let state=loadState()||{habits:DEFAULT_HABITS.map(n=>({name:n})),log:{},best:0};
function getChecked(){ return state.log[todayKey()]||[]; }
function calcStreak(){
  let streak=0; const d=new Date();
  for(let i=0;i<365;i++){
    const key=d.toISOString().slice(0,10),checked=state.log[key]||[];
    if(state.habits.length>0&&checked.length===state.habits.length){ streak++; d.setDate(d.getDate()-1); } else break;
  }
  return streak;
}
function renderHabits(){
  const list=document.getElementById('habits-list'),checked=getChecked();
  list.innerHTML='';
  if(state.habits.length===0){
    list.innerHTML='<div class="empty-state">No habits yet. Add one above.</div>';
  } else {
    state.habits.forEach((h,i)=>{
      const isDone=checked.includes(i),row=document.createElement('div');
      row.className='habit-row';
      row.innerHTML=`
        <div class="habit-check ${isDone?'done':''}" onclick="toggleHabit(${i})"></div>
        <span class="habit-name ${isDone?'done':''}" onclick="toggleHabit(${i})">${h.name}</span>
        <button class="habit-delete" onclick="deleteHabit(${i})" aria-label="Remove"><i class="ti ti-x"></i></button>
      `;
      list.appendChild(row);
    });
  }
  const streak=calcStreak();
  if(streak>(state.best||0)) state.best=streak;
  document.getElementById('stat-today').textContent=checked.length+'/'+state.habits.length;
  document.getElementById('stat-streak').textContent=streak;
  document.getElementById('stat-best').textContent=state.best||0;
  document.getElementById('today-lbl').textContent=new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});
  saveState(state);
}
function toggleHabit(i){
  const today=todayKey();
  if(!state.log[today]) state.log[today]=[];
  const idx=state.log[today].indexOf(i);
  if(idx===-1) state.log[today].push(i); else state.log[today].splice(idx,1);
  renderHabits();
}
function deleteHabit(i){
  state.habits.splice(i,1);
  Object.keys(state.log).forEach(k=>{ state.log[k]=state.log[k].filter(x=>x!==i).map(x=>x>i?x-1:x); });
  renderHabits();
}
function addHabit(){
  const input=document.getElementById('new-habit'),name=input.value.trim();
  if(!name) return;
  state.habits.push({name}); input.value=''; renderHabits();
}
document.getElementById('new-habit').addEventListener('keydown',e=>{ if(e.key==='Enter') addHabit(); });
renderHabits();
</script>
</body>
</html>
